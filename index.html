<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>El Combito App</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-[#FDFDFD]">
    <div id="root"></div>

    <script type="text/babel">
        // Extraemos las funciones de React para usarlas sin "React."
        const { useState, useEffect, useMemo, useRef } = React;

        // --- COMPONENTES DE ICONOS (Simulación de Lucide) ---
        const Icon = ({ name, size = 24, className = "" }) => {
            useEffect(() => { lucide.createIcons(); }, []);
            return <i data-lucide={name} style={{width: size, height: size}} className={className}></i>;
        };

        // --- COMPONENTE LOGO ---
        const LogoCombito = ({ size = "normal" }) => (
            <div className="flex flex-col items-center">
                <div className="flex gap-0.5 mb-1.5">
                    {[...Array(5)].map((_, i) => <Icon key={i} name="star" size={size === "small" ? 8 : 12} className="text-yellow-400 fill-yellow-400" />)}
                </div>
                <h1 className={`font-black text-white italic tracking-tighter uppercase leading-none ${size === "small" ? 'text-lg' : 'text-3xl'}`}>
                    EL COMBITO
                </h1>
                <div className="bg-yellow-400 h-[2px] w-full mt-1"></div>
            </div>
        );

        // --- APLICACIÓN PRINCIPAL ---
        function App() {
            const [activeTab, setActiveTab] = useState('resumen');
            
            // PERSISTENCIA: Cargamos datos del LocalStorage al iniciar
            const [transactions, setTransactions] = useState(() => {
                const saved = localStorage.getItem('combito_ventas');
                return saved ? JSON.parse(saved) : [];
            });

            // Cada vez que transactions cambie, guardamos en LocalStorage
            useEffect(() => {
                localStorage.setItem('combito_ventas', JSON.stringify(transactions));
            }, [transactions]);

            const [formData, setFormData] = useState({ description: '', amount: '', type: 'ingreso' });

            const handleSave = (e) => {
                e.preventDefault();
                const nuevaVenta = {
                    id: Date.now(),
                    ...formData,
                    date: new Date().toLocaleDateString()
                };
                setTransactions([nuevaVenta, ...transactions]);
                setFormData({ description: '', amount: '', type: 'ingreso' });
                alert("¡Venta guardada en tu teléfono!");
            };

            return (
                <div className="min-h-screen flex flex-col pb-24">
                    <header className="bg-[#E61919] p-8 rounded-b-[40px] shadow-xl text-center">
                        <LogoCombito />
                        <div className="mt-6 bg-white/10 p-4 rounded-2xl text-white">
                            <p className="text-[10px] uppercase font-bold opacity-70">Balance en este equipo</p>
                            <p className="text-3xl font-black">S/ {transactions.reduce((acc, t) => acc + (t.type === 'ingreso' ? parseFloat(t.amount) : -parseFloat(t.amount)), 0).toFixed(2)}</p>
                        </div>
                    </header>

                    <main className="p-6 space-y-6">
                        {activeTab === 'resumen' && (
                            <form onSubmit={handleSave} className="bg-white p-6 rounded-[30px] shadow-sm border border-slate-100 space-y-4">
                                <h3 className="font-black italic uppercase text-slate-800">Registrar Venta</h3>
                                <input 
                                    type="text" placeholder="¿Qué vendiste?" 
                                    className="w-full p-4 bg-slate-50 rounded-xl outline-none font-bold"
                                    value={formData.description}
                                    onChange={e => setFormData({...formData, description: e.target.value})}
                                />
                                <input 
                                    type="number" placeholder="Monto S/" 
                                    className="w-full p-4 bg-slate-50 rounded-xl outline-none font-black text-2xl text-red-600"
                                    value={formData.amount}
                                    onChange={e => setFormData({...formData, amount: e.target.value})}
                                />
                                <button className="w-full py-4 bg-red-600 text-white rounded-2xl font-black uppercase shadow-lg active:scale-95 transition-all">
                                    GUARDAR DATOS
                                </button>
                            </form>
                        )}

                        {activeTab === 'historial' && (
                            <div className="space-y-4">
                                <h3 className="font-black italic uppercase text-slate-800">Últimos Movimientos</h3>
                                {transactions.map(t => (
                                    <div key={t.id} className="bg-white p-4 rounded-2xl shadow-sm border border-slate-50 flex justify-between items-center">
                                        <div>
                                            <p className="font-bold text-slate-800 uppercase text-xs">{t.description}</p>
                                            <p className="text-[10px] text-slate-400">{t.date}</p>
                                        </div>
                                        <p className="font-black text-emerald-600">S/ {t.amount}</p>
                                    </div>
                                ))}
                            </div>
                        )}
                    </main>

                    <nav className="fixed bottom-0 left-0 right-0 bg-white border-t p-4 flex justify-around shadow-[0_-10px_30px_rgba(0,0,0,0.05)]">
                        <button onClick={() => setActiveTab('resumen')} className={`flex flex-col items-center ${activeTab === 'resumen' ? 'text-red-600' : 'text-slate-300'}`}>
                            <Icon name="layout-dashboard" />
                            <span className="text-[10px] font-black uppercase">App</span>
                        </button>
                        <button onClick={() => setActiveTab('historial')} className={`flex flex-col items-center ${activeTab === 'historial' ? 'text-red-600' : 'text-slate-300'}`}>
                            <Icon name="clipboard-list" />
                            <span className="text-[10px] font-black uppercase">Datos</span>
                        </button>
                    </nav>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
